name: Setup Node.js with Dependencies
description: Sets up Node.js, pnpm, caches dependencies, and installs for monorepo
inputs:
  working-directory:
    description: The working directory for pnpm commands (for backwards compatibility)
    required: true
  node-version:
    description: Node.js version to use
    required: false
    default: '22'
  cache-key-prefix:
    description: Optional prefix for cache key (defaults to working directory basename)
    required: false
    default: ''
  frozen-lockfile:
    description: >-
      Whether to install with --frozen-lockfile. Set to 'false' for workflows
      that intentionally reconcile the lockfile (e.g. dependabot audit fix),
      where the incoming lockfile may be out of sync with package.json.
    required: false
    default: 'true'
outputs:
  cache-hit:
    description: Whether node_modules cache was hit
    value: ${{ steps.cache-node-modules.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
    # Determine cache key prefix (use provided prefix or derive from working directory)
    - name: Determine cache key prefix
      id: cache-prefix
      shell: bash
      run: |
        if [ -n "${{ inputs.cache-key-prefix }}" ]; then
          echo "prefix=${{ inputs.cache-key-prefix }}" >> $GITHUB_OUTPUT
        else
          # Extract basename from working directory for cache isolation
          basename=$(basename "${{ inputs.working-directory }}")
          echo "prefix=${basename}" >> $GITHUB_OUTPUT
        fi
    # Cache root node_modules for monorepo workspaces
    # This caches the hoisted dependencies that workspace packages use
    - name: Cache root node_modules
      id: cache-root-modules
      uses: actions/cache@v5
      with:
        path: node_modules
        key: root-node-modules-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          root-node-modules-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
          root-node-modules-v4-${{ runner.os }}-main-
          root-node-modules-v4-${{ runner.os }}-
    # Cache workspace node_modules (for any local-only modules)
    - name: Cache node_modules
      id: cache-node-modules
      uses: actions/cache@v5
      with:
        path: ${{ inputs.working-directory }}/node_modules
        key: ${{ steps.cache-prefix.outputs.prefix }}-node-modules-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ steps.cache-prefix.outputs.prefix }}-node-modules-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
          ${{ steps.cache-prefix.outputs.prefix }}-node-modules-v4-${{ runner.os }}-main-
          ${{ steps.cache-prefix.outputs.prefix }}-node-modules-v4-${{ runner.os }}-
    # Install from root to handle workspaces correctly.
    # When frozen-lockfile is 'false', always install so the lockfile is
    # reconciled with package.json even if a stale node_modules cache was hit.
    - name: Install dependencies
      if: inputs.frozen-lockfile != 'true' || steps.cache-root-modules.outputs.cache-hit != 'true' || steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install --no-frozen-lockfile
        fi
