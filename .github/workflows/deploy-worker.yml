name: Deploy Worker
on:
  push:
    branches: [main]
    paths:
      - 'packages/worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: # Allow manual trigger
jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    # Only deploy if Cloudflare secrets are configured
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    defaults:
      run:
        working-directory: packages/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/worker
      - name: Lint
        run: pnpm run lint
      - name: Run tests
        run: pnpm test
      - name: Compute worker git hash
        id: worker-hash
        run: |
          # Compute a short hash based on the last commit that modified packages/worker/ files.
          # This ensures the hash only changes when worker code changes, not when
          # web app code changes. Used for PWA version tracking.
          WORKER_GIT_HASH=$(git log -1 --format='%h' -- .)
          echo "hash=$WORKER_GIT_HASH" >> "$GITHUB_OUTPUT"
          echo "Worker git hash: $WORKER_GIT_HASH"
      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --define __WORKER_GIT_HASH__:\"${{ steps.worker-hash.outputs.hash }}\"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
