name: Update Dependencies (Worker)
on:
  # Run weekly on Sundays at 14:30 UTC (after shared/web/mobile)
  schedule:
    - cron: '30 14 * * 0'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (check updates and validate without creating PR)'
        required: false
        default: false
        type: boolean
# =============================================================================
# Worker Dependency Update Workflow
# =============================================================================
#
# This workflow automatically updates dependencies for the worker,
# runs full validation, and creates a PR if successful.
#
# Flow:
#   1. Check for updates using npm-check-updates
#   2. If updates found, install and run validation
#   3. Run lint, test, and typecheck
#   4. Create PR with changes if all validations pass
#
# =============================================================================
concurrency:
  group: update-deps-worker
  cancel-in-progress: true
jobs:
  update:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_updates: ${{ steps.check-updates.outputs.has_updates }}
      updates_summary: ${{ steps.check-updates.outputs.updates_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install npm-check-updates
        run: pnpm add -g npm-check-updates@17
      - name: Determine update target
        id: update-target
        run: |
          UPDATE_TYPE="${{ github.event.inputs.update_type || 'minor' }}"
          case "$UPDATE_TYPE" in
            patch) NCU_TARGET="patch" ;;
            minor) NCU_TARGET="minor" ;;
            major) NCU_TARGET="latest" ;;
          esac
          echo "ncu_target=$NCU_TARGET" >> "$GITHUB_OUTPUT"
          echo "Update target: $NCU_TARGET"
      - name: Check for updates
        id: check-updates
        run: |
          NCU_TARGET="${{ steps.update-target.outputs.ncu_target }}"
          echo "Checking for updates with target: $NCU_TARGET"

          # Check worker updates
          cd worker
          WORKER_UPDATES=$(ncu --target "${NCU_TARGET}" --format lines 2>/dev/null || true)
          cd ..

          if [ -n "$WORKER_UPDATES" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            # Escape for multiline output
            {
              echo "updates_summary<<EOF"
              echo "**worker:**"
              echo "$WORKER_UPDATES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Updates found:"
            echo "$WORKER_UPDATES"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "No updates available"
          fi
      - name: Apply updates
        if: steps.check-updates.outputs.has_updates == 'true'
        run: |
          NCU_TARGET="${{ steps.update-target.outputs.ncu_target }}"

          # Update worker dependencies
          cd worker
          ncu --target "$NCU_TARGET" -u
          cd ..

          # Install updated dependencies (--no-frozen-lockfile needed since ncu modified package.json)
          pnpm install --no-frozen-lockfile
      - name: Auto-fix audit vulnerabilities
        if: steps.check-updates.outputs.has_updates == 'true'
        run: |
          echo "Checking for fixable audit vulnerabilities..."
          if ! pnpm audit --audit-level high --prod; then
            echo "Audit issues found, attempting auto-fix..."
            pnpm audit --fix || true
            pnpm install --no-frozen-lockfile
            if pnpm audit --audit-level high --prod > /dev/null 2>&1; then
              echo "::notice::Audit vulnerabilities were automatically fixed"
            else
              echo "::warning::Some audit vulnerabilities could not be auto-fixed"
            fi
          else
            echo "No audit issues found"
          fi
      - name: Upload updated files
        if: steps.check-updates.outputs.has_updates == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-packages-worker
          path: |
            pnpm-lock.yaml
            package.json
            worker/package.json
          retention-days: 1
  validate:
    name: Validate
    needs: update
    if: needs.update.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download updated packages
        uses: actions/download-artifact@v8
        with:
          name: updated-packages-worker
          path: .
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: worker
      - name: TypeScript check
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm run lint
      - name: Security audit
        run: pnpm audit --audit-level high --prod
        working-directory: .
      - name: Test
        run: pnpm test
      - name: Build (dry-run)
        run: pnpm exec wrangler deploy --dry-run
  create-pr:
    name: Create PR
    needs: [update, validate]
    # Note: For scheduled runs, github.event.inputs.dry_run is empty/null, so this evaluates to true (create PR)
    if: needs.update.outputs.has_updates == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download updated packages
        uses: actions/download-artifact@v8
        with:
          name: updated-packages-worker
          path: .
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          commit-message: 'chore(worker): update dependencies'
          title: 'chore(worker): update dependencies'
          body: |
            ## Dependency Updates

            This PR was automatically generated by the dependency update workflow.

            ### Updated Packages

            ${{ needs.update.outputs.updates_summary }}

            ### Validation

            All validations passed:
            - TypeScript check
            - Lint
            - Security audit
            - Tests
            - Build (dry-run)
          branch: chore/update-worker-deps
          delete-branch: true
          labels: |
            dependencies
            automated
