name: CI
on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'
      - 'docs/api/volleymanager-openapi.yaml'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'
  pull_request:
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'
      - 'docs/api/volleymanager-openapi.yaml'
      - '.changeset/**'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'
# =============================================================================
# CI Pipeline Architecture
# =============================================================================
#
# Job Dependency Graph:
#
#   setup ─────┬──────────────────────────────────────┐
#   (API types)│                                      │
#              ├──> lint ──────┐                      │
#              ├──> knip       │                      │
#              ├──> test       │                      │
#              └──> build ─────┼──> bundle-size       │
#                              ├──> e2e (per browser) │
#                              └──> lighthouse        │
#                                                     │
#   audit (independent) ──────────────────────────────┘
#   changeset (PR only, independent) ─────────────────┘
#
# Key Design Decisions:
# - setup job generates API types ONCE, shared via artifact to avoid 4x generation
# - audit runs independently (doesn't need API types)
# - build artifact is shared by bundle-size, e2e, and lighthouse
# - Tool caches (ESLint, Vitest, Vite) keyed by config, not source files for better reuse
# - PRs run chromium only; main branch runs chromium + firefox + webkit
# - E2E uses pre-built Playwright Docker image (no browser install overhead)
#
# =============================================================================
jobs:
  # Setup job - generates API types once, shared by all downstream jobs
  # This is the CRITICAL PATH for lint, knip, test, and build jobs
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      api-cache-key: ${{ steps.api-cache-key.outputs.key }}
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Generate API cache key
        id: api-cache-key
        run: echo "key=api-types-${{ hashFiles('docs/api/volleymanager-openapi.yaml', 'pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT
      - name: Cache generated API types
        id: api-cache
        uses: actions/cache@v5
        with:
          path: |
            packages/web/src/api/schema.ts
            packages/shared/src/api/schema.ts
          key: ${{ steps.api-cache-key.outputs.key }}
      - name: Generate API types
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: pnpm run generate:api
      # Upload API types as artifact for downstream jobs (both locations)
      - name: Upload API types
        uses: actions/upload-artifact@v7
        with:
          name: api-types
          path: |
            packages/web/src/api/schema.ts
            packages/shared/src/api/schema.ts
          retention-days: 1
  # Security audit - runs independently (doesn't need API types)
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Audit dependencies
        run: |
          # Known unfixable vulnerabilities to ignore:
          # - GHSA-3ppc-4f35-3m26: minimatch ReDoS (transitive via eslint, no fix until eslint 10)
          # - GHSA-jmr7-xgp7-cmfj: fast-xml-parser DoS (transitive via ojp-sdk-next, no upstream fix)
          IGNORED_ADVISORIES="GHSA-3ppc-4f35-3m26 GHSA-jmr7-xgp7-cmfj"
          AUDIT_JSON=$(pnpm audit --audit-level high --prod --json 2>/dev/null || true)
          FOUND=$(echo "$AUDIT_JSON" | jq -r '.vulnerabilities | keys[]' 2>/dev/null || true)

          # First pass: collect packages with directly ignored advisories
          IGNORED_PKGS=""
          for vuln in $FOUND; do
            ADVISORIES=$(echo "$AUDIT_JSON" | jq -r ".vulnerabilities[\"$vuln\"].via[] | if type == \"object\" then .url else empty end" 2>/dev/null || true)
            if [ -n "$ADVISORIES" ]; then
              ALL_MATCHED=true
              for adv in $ADVISORIES; do
                MATCHED=false
                for ignored in $IGNORED_ADVISORIES; do
                  if echo "$adv" | grep -q "$ignored"; then MATCHED=true; fi
                done
                if [ "$MATCHED" = "false" ]; then ALL_MATCHED=false; fi
              done
              if [ "$ALL_MATCHED" = "true" ]; then IGNORED_PKGS="$IGNORED_PKGS $vuln"; fi
            fi
          done

          # Second pass: also ignore packages that are only vulnerable transitively via ignored packages
          UNIGNORED=""
          for vuln in $FOUND; do
            if echo "$IGNORED_PKGS" | grep -qw "$vuln"; then continue; fi
            VIA_PKGS=$(echo "$AUDIT_JSON" | jq -r ".vulnerabilities[\"$vuln\"].via[] | if type == \"string\" then . else empty end" 2>/dev/null || true)
            if [ -n "$VIA_PKGS" ]; then
              ALL_VIA_IGNORED=true
              for via_pkg in $VIA_PKGS; do
                echo "$IGNORED_PKGS" | grep -qw "$via_pkg" || ALL_VIA_IGNORED=false
              done
              if [ "$ALL_VIA_IGNORED" = "true" ]; then continue; fi
            fi
            UNIGNORED="$UNIGNORED $vuln"
          done

          if [ -n "$(echo "$UNIGNORED" | xargs)" ]; then
            echo "::error::New vulnerabilities found:$UNIGNORED"
            pnpm audit --audit-level high --prod
            exit 1
          fi
          echo "All vulnerabilities are known/ignored. Audit passed."
  # Lint check - needs API types from setup
  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Download API types
        uses: actions/download-artifact@v8
        with:
          name: api-types
          path: .
      # Cache ESLint results (ESLint handles per-file invalidation internally)
      # Key based on ESLint config, TypeScript config, and plugins
      - name: Cache ESLint
        uses: actions/cache@v5
        with:
          path: packages/web/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('packages/web/eslint.config.js', 'packages/web/tsconfig.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            eslint-${{ runner.os }}-
      - name: Lint
        run: pnpm run lint --cache --cache-location .eslintcache
  # Dead code detection - needs API types from setup
  knip:
    name: Dead Code Check
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Download API types
        uses: actions/download-artifact@v8
        with:
          name: api-types
          path: .
      - name: Check for dead code
        run: pnpm run knip
  # Unit tests - needs API types from setup
  # PRs: only run tests affected by changed files (--changed)
  # main: run all tests for full coverage validation
  test:
    name: Test
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history needed for --changed to compare against base branch
          fetch-depth: 0
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Download API types
        uses: actions/download-artifact@v8
        with:
          name: api-types
          path: .
      # Cache Vite/Vitest transform cache (Vitest stores cache in .vite/vitest)
      # Key based on tooling config - source file changes don't invalidate transforms
      - name: Cache Vite
        uses: actions/cache@v5
        with:
          path: packages/web/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/web/vite.config.ts', 'packages/web/tsconfig.json') }}
          restore-keys: |
            vite-${{ runner.os }}-
      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PRs: only run tests affected by changes since base branch
            pnpm test --changed origin/${{ github.base_ref }}
          else
            # main branch: run all tests
            pnpm test
          fi
  # Build once - artifact shared by bundle-size, e2e, and lighthouse
  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Download API types
        uses: actions/download-artifact@v8
        with:
          name: api-types
          path: .
      # Cache Vite pre-bundled dependencies (shared key with test job)
      # Key based on dependencies and config - source changes don't affect dep pre-bundling
      - name: Cache Vite
        uses: actions/cache@v5
        with:
          path: packages/web/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/web/vite.config.ts', 'packages/web/tsconfig.json') }}
          restore-keys: |
            vite-${{ runner.os }}-
      - name: Build
        run: pnpm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-app-dist
          path: packages/web/dist
          retention-days: 1
  # Bundle size check - lightweight job, only needs build artifact
  bundle-size:
    name: Bundle Size
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-app-dist
          path: packages/web/dist
      - name: Check bundle size
        run: pnpm run size
  # E2E tests - per browser, uses build artifact
  # PRs: chromium only (fast feedback)
  # main: chromium + firefox + webkit (full coverage)
  # Uses pre-built Playwright Docker image (browsers pre-installed)
  e2e:
    name: E2E (${{ matrix.browser }})
    needs: build
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # PRs: chromium only; main: all browsers
        browser: ${{ github.event_name == 'pull_request' && fromJson('["chromium"]') || fromJson('["chromium", "firefox", "webkit"]') }}
    defaults:
      run:
        working-directory: packages/web
    # Firefox requires HOME to be owned by current user in containers
    env:
      HOME: /root
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-app-dist
          path: packages/web/dist
      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.browser }} --retries=2
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browser }}
          path: packages/web/playwright-report/
          retention-days: 7
  # Lighthouse performance audit - uses build artifact
  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/web
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-app-dist
          path: packages/web/dist
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./packages/web/lighthouserc.json
  # Changeset check - ensures PRs include changelog entries
  # Only runs on PRs, reports missing changesets (informational)
  changeset:
    name: Changeset
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Install changeset CLI
        run: pnpm add -g @changesets/cli
      - name: Check for changesets
        id: changeset_check
        run: |
          # Count changeset files (excluding config.json and README.md)
          CHANGESET_COUNT=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l)

          if [ "$CHANGESET_COUNT" -eq 0 ]; then
            echo "has_changeset=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No changeset found. If this PR includes user-facing changes, please run 'pnpm exec changeset' to add a changelog entry."
          else
            echo "has_changeset=true" >> "$GITHUB_OUTPUT"
            echo "Found $CHANGESET_COUNT changeset(s)"
          fi
      - name: Summary
        run: |
          if [ "${{ steps.changeset_check.outputs.has_changeset }}" = "true" ]; then
            echo "## Changeset Found" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This PR includes changelog entries." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No Changeset" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This PR does not include a changeset." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "If this PR includes user-facing changes (features, fixes), please add a changeset:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```bash' >> "$GITHUB_STEP_SUMMARY"
            echo 'pnpm exec changeset' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "If this PR is docs-only or internal, no changeset is needed." >> "$GITHUB_STEP_SUMMARY"
          fi
