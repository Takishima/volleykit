name: CI - Worker
on:
  push:
    branches: [main]
    paths:
      - 'packages/worker/**'
      - '.github/workflows/ci-worker.yml'
      - '.github/actions/**'
  pull_request:
    paths:
      - 'packages/worker/**'
      - '.github/workflows/ci-worker.yml'
      - '.github/actions/**'
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/worker
      # Cache ESLint results per branch
      - name: Cache ESLint
        uses: actions/cache@v5
        with:
          path: packages/worker/.eslintcache
          key: packages/worker-eslint-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('packages/worker/src/**/*.ts') }}
          restore-keys: |
            packages/worker-eslint-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            packages/worker-eslint-${{ runner.os }}-
      - name: Lint
        run: pnpm run lint --cache --cache-location .eslintcache
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: packages/worker
      - name: Run tests
        run: pnpm test
