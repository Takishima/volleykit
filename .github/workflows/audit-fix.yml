name: Security Audit Fix
on:
  # Run daily at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (check and fix without creating PR)'
        required: false
        default: false
        type: boolean
# =============================================================================
# Security Audit Fix Workflow
# =============================================================================
#
# This workflow automatically checks for vulnerabilities and creates a PR
# if `pnpm audit --fix` can resolve any of them (non-breaking fixes only).
#
# Flow:
#   1. Run pnpm audit to detect fixable vulnerabilities
#   2. Apply pnpm audit --fix (non-breaking)
#   3. If changes detected, run full validation
#   4. Create PR with vulnerability details if all validations pass
#
# Scope: root monorepo (all workspaces share a single pnpm-lock.yaml)
#
# =============================================================================
concurrency:
  group: audit-fix
  cancel-in-progress: true
jobs:
  audit-fix:
    name: Audit & Fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_fixes: ${{ steps.detect-changes.outputs.has_fixes }}
      audit_summary: ${{ steps.audit-report.outputs.audit_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: web-app
      - name: Capture pre-fix audit report
        id: pre-audit
        run: |
          # Capture audit (high severity, production only)
          AUDIT_JSON=$(pnpm audit --audit-level high --prod --json 2>/dev/null || true)
          VULN_COUNT=$(echo "$AUDIT_JSON" | jq -r '[.vulnerabilities | to_entries[] | select(.value.fixAvailable == true)] | length' 2>/dev/null || echo "0")
          echo "fixable=$VULN_COUNT" >> "$GITHUB_OUTPUT"

          echo "Fixable vulnerabilities: $VULN_COUNT"

          if [ "$VULN_COUNT" = "0" ]; then
            echo "No fixable vulnerabilities found. Exiting early."
            echo "has_fixable=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_fixable=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply pnpm audit fix
        if: steps.pre-audit.outputs.has_fixable == 'true'
        run: pnpm audit --fix || true
      - name: Detect changes
        id: detect-changes
        run: |
          if git diff --quiet; then
            echo "No changes after audit fix."
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected after audit fix."
            echo "has_fixes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --name-only
          fi
      - name: Generate audit summary
        id: audit-report
        if: steps.detect-changes.outputs.has_fixes == 'true'
        run: |
          # Generate a human-readable summary of what was fixed
          LOCK_CHANGED=$(git diff --name-only pnpm-lock.yaml 2>/dev/null || true)
          SUMMARY=""
          if [ -n "$LOCK_CHANGED" ]; then
            AUDIT_JSON=$(pnpm audit --audit-level high --prod --json 2>/dev/null || true)
            REMAINING=$(echo "$AUDIT_JSON" | jq -r '[.vulnerabilities | to_entries[]] | length' 2>/dev/null || echo "0")
            FIXED_COUNT="${{ steps.pre-audit.outputs.fixable }}"
            PLURAL=$( [ "$FIXED_COUNT" = "1" ] && echo "vulnerability" || echo "vulnerabilities" )
            SUMMARY="**Monorepo:** fixed $FIXED_COUNT $PLURAL ($REMAINING remaining)"
          fi

          # Package diff summary
          PKG_DIFF=$(git diff --stat)

          {
            echo "audit_summary<<EOF"
            echo "$SUMMARY"
            echo ""
            echo "#### Changed files"
            echo '```'
            echo "$PKG_DIFF"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Upload fixed files
        if: steps.detect-changes.outputs.has_fixes == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: audit-fix-packages
          path: |
            pnpm-lock.yaml
            package.json
            web-app/package.json
            packages/shared/package.json
            packages/mobile/package.json
            worker/package.json
          retention-days: 1
  validate:
    name: Validate
    needs: audit-fix
    if: needs.audit-fix.outputs.has_fixes == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download fixed packages
        uses: actions/download-artifact@v7
        with:
          name: audit-fix-packages
          path: .
      - name: Setup Node.js with dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          working-directory: web-app
      - name: Generate API types
        run: pnpm run generate:api
      - name: Lint
        run: pnpm run lint
      - name: Dead code check
        run: pnpm run knip
      - name: Security audit (informational)
        run: pnpm audit --audit-level high --prod || true
        working-directory: .
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm run build
      - name: Bundle size check
        run: pnpm run size
  create-pr:
    name: Create PR
    needs: [audit-fix, validate]
    # Note: For scheduled runs, github.event.inputs.dry_run is empty/null, so this evaluates to true (create PR)
    if: needs.audit-fix.outputs.has_fixes == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download fixed packages
        uses: actions/download-artifact@v7
        with:
          name: audit-fix-packages
          path: .
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          commit-message: 'fix(deps): auto-fix audit vulnerabilities'
          title: 'fix(deps): auto-fix audit vulnerabilities'
          body: |
            ## Security Audit Fix

            This PR was automatically generated by the daily security audit workflow.
            Only non-breaking fixes (`pnpm audit --fix`) have been applied.

            ### Summary

            ${{ needs.audit-fix.outputs.audit_summary }}

            ### Validation

            All validations passed:
            - Lint
            - Dead code check (knip)
            - Security audit
            - Tests
            - Build
            - Bundle size check
          branch: fix/audit-vulnerabilities
          delete-branch: true
          labels: |
            security
            dependencies
            automated
